services:
  elibo-multiplication-game:
    image: ${ELIBO_MULTIPLICATION_GAME_IMAGE:-ghcr.io/elfiboewer/elibo-multiplication-game:main}
    container_name: elibo-multiplication-game
    restart: unless-stopped
    ports:
      - "${ELIBO_MULTIPLICATION_GAME_PORT:-8092}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
